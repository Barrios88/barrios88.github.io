<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="920" height="700" viewBox="0 0 920 700" version="1.1">

  <defs>
    <style>
      .title { font-size: 24px; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #00356b; }
      .subtitle { font-size: 14px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #63605b; font-style: italic; }
      .section-label { font-size: 13px; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #00356b; }
      .box-title { font-size: 12px; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #00356b; }
      .box-text { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #3a3632; line-height: 1.4; }
      .box-text-small { font-size: 10px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #63605b; }
      .arrow-label { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #1a4f8a; font-weight: 600; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1a4f8a" />
    </marker>

    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#bd5319" />
    </marker>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="700" fill="#f9f7f4" />

  <!-- Title and Subtitle -->
  <text x="460" y="35" text-anchor="middle" class="title">Strategic Disclosure Mechanism</text>
  <text x="460" y="53" text-anchor="middle" class="subtitle">Antitrust Risk and Merger Disclosure Choices</text>

  <!-- LEVEL 1: MERGER TYPE ASSESSMENT -->
  <g id="level1">
    <rect x="30" y="85" width="860" height="2" fill="#d4d0c8" />
    <text x="30" y="75" class="section-label" font-size="10">LEVEL 1: MERGER ASSESSMENT</text>

    <!-- Low-risk mergers -->
    <rect x="40" y="95" width="140" height="70" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="110" y="115" text-anchor="middle" class="box-title">Low Antitrust Risk</text>
    <text x="110" y="130" text-anchor="middle" class="box-text">Vertical or</text>
    <text x="110" y="143" text-anchor="middle" class="box-text">diversifying</text>
    <text x="110" y="156" text-anchor="middle" class="box-text">mergers</text>

    <!-- Horizontal mergers (low concentration) -->
    <rect x="220" y="95" width="140" height="70" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="290" y="115" text-anchor="middle" class="box-title">Moderate Risk</text>
    <text x="290" y="130" text-anchor="middle" class="box-text">Horizontal with</text>
    <text x="290" y="143" text-anchor="middle" class="box-text">limited market</text>
    <text x="290" y="156" text-anchor="middle" class="box-text">overlap</text>

    <!-- High-risk horizontal mergers -->
    <rect x="400" y="95" width="140" height="70" rx="5" fill="#ffffff" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="470" y="115" text-anchor="middle" class="box-title" fill="#bd5319">High Antitrust Risk</text>
    <text x="470" y="130" text-anchor="middle" class="box-text">Horizontal mergers</text>
    <text x="470" y="143" text-anchor="middle" class="box-text">with significant</text>
    <text x="470" y="156" text-anchor="middle" class="box-text">overlap</text>

    <!-- 10% threshold -->
    <rect x="580" y="95" width="140" height="70" rx="5" fill="#fef3e6" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="650" y="115" text-anchor="middle" class="box-title" fill="#bd5319">Size Threshold</text>
    <text x="650" y="130" text-anchor="middle" class="box-text" font-weight="700">≥10% assets</text>
    <text x="650" y="143" text-anchor="middle" class="box-text">triggers Item 2</text>
    <text x="650" y="156" text-anchor="middle" class="box-text">mandatory filing</text>

    <!-- Strategic considerations -->
    <rect x="760" y="95" width="140" height="70" rx="5" fill="#e8f0f7" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="830" y="115" text-anchor="middle" class="box-title">Strategic Decision</text>
    <text x="830" y="130" text-anchor="middle" class="box-text">Evaluate</text>
    <text x="830" y="143" text-anchor="middle" class="box-text">disclosure vs.</text>
    <text x="830" y="156" text-anchor="middle" class="box-text">antitrust risk</text>
  </g>

  <!-- Arrows from Level 1 to Level 2 -->
  <line x1="110" y1="165" x2="110" y2="195" stroke="#63605b" stroke-width="1.5" />
  <line x1="290" y1="165" x2="290" y2="195" stroke="#63605b" stroke-width="1.5" />
  <line x1="470" y1="165" x2="470" y2="195" stroke="#bd5319" stroke-width="2" />
  <line x1="650" y1="165" x2="650" y2="195" stroke="#bd5319" stroke-width="2" />
  <line x1="830" y1="165" x2="830" y2="195" stroke="#63605b" stroke-width="1.5" />

  <!-- LEVEL 2: DISCLOSURE DECISION -->
  <g id="level2">
    <rect x="30" y="200" width="860" height="2" fill="#d4d0c8" />
    <text x="30" y="190" class="section-label" font-size="10">LEVEL 2: DISCLOSURE CHOICE</text>

    <!-- No disclosure option -->
    <rect x="40" y="210" width="135" height="95" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="107.5" y="233" text-anchor="middle" class="box-title">Silent Filings</text>
    <text x="107.5" y="248" text-anchor="middle" class="box-text-small">No public</text>
    <text x="107.5" y="260" text-anchor="middle" class="box-text-small">announcement</text>
    <text x="107.5" y="272" text-anchor="middle" class="box-text-small">Avoid detection</text>
    <text x="107.5" y="284" text-anchor="middle" class="box-text-small">Higher antitrust</text>
    <text x="107.5" y="296" text-anchor="middle" class="box-text-small">risk</text>

    <!-- Basic disclosure -->
    <rect x="205" y="210" width="135" height="95" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="272.5" y="233" text-anchor="middle" class="box-title">Basic Filings</text>
    <text x="272.5" y="248" text-anchor="middle" class="box-text-small">Generic SEC</text>
    <text x="272.5" y="260" text-anchor="middle" class="box-text-small">forms without</text>
    <text x="272.5" y="272" text-anchor="middle" class="box-text-small">detailed risk</text>
    <text x="272.5" y="284" text-anchor="middle" class="box-text-small">disclosure</text>
    <text x="272.5" y="296" text-anchor="middle" class="box-text-small">information</text>

    <!-- Item 2 detailed disclosure (blue/preferred) -->
    <rect x="370" y="210" width="135" height="95" rx="5" fill="#e8f0f7" stroke="#00356b" stroke-width="2" filter="url(#shadow)" />
    <text x="437.5" y="233" text-anchor="middle" class="box-title">Detailed Item 2</text>
    <text x="437.5" y="248" text-anchor="middle" class="box-text-small">Explicit antitrust</text>
    <text x="437.5" y="260" text-anchor="middle" class="box-text-small">risk disclosure</text>
    <text x="437.5" y="272" text-anchor="middle" class="box-text-small">Forward-looking</text>
    <text x="437.5" y="284" text-anchor="middle" class="box-text-small">statements</text>
    <text x="437.5" y="296" text-anchor="middle" class="box-text-small">Mandatory</text>

    <!-- HSR premerger notification -->
    <rect x="535" y="210" width="135" height="95" rx="5" fill="#fef3e6" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="602.5" y="233" text-anchor="middle" class="box-title" fill="#bd5319">HSR Filing</text>
    <text x="602.5" y="248" text-anchor="middle" class="box-text-small">Mandatory</text>
    <text x="602.5" y="260" text-anchor="middle" class="box-text-small">antitrust filing</text>
    <text x="602.5" y="272" text-anchor="middle" class="box-text-small">Most detailed</text>
    <text x="602.5" y="284" text-anchor="middle" class="box-text-small">pre-closing</text>
    <text x="602.5" y="296" text-anchor="middle" class="box-text-small">information</text>

    <!-- Timing consideration -->
    <rect x="700" y="210" width="150" height="95" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="775" y="233" text-anchor="middle" class="box-title">Timing Strategy</text>
    <text x="775" y="248" text-anchor="middle" class="box-text-small">Announce during</text>
    <text x="775" y="260" text-anchor="middle" class="box-text-small">low-attention</text>
    <text x="775" y="272" text-anchor="middle" class="box-text-small">periods to</text>
    <text x="775" y="284" text-anchor="middle" class="box-text-small">minimize media</text>
    <text x="775" y="296" text-anchor="middle" class="box-text-small">coverage</text>
  </g>

  <!-- Arrow from Level 2 to Level 3 -->
  <line x1="460" y1="305" x2="460" y2="335" stroke="#63605b" stroke-width="1.5" />
  <text x="475" y="323" class="arrow-label" font-size="10">Regulatory scrutiny</text>

  <!-- LEVEL 3: REGULATORY MECHANISM -->
  <g id="level3">
    <rect x="30" y="340" width="860" height="2" fill="#d4d0c8" />
    <text x="30" y="330" class="section-label" font-size="10">LEVEL 3: REGULATORY MECHANISM</text>

    <!-- Detection -->
    <rect x="50" y="350" width="170" height="85" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="135" y="372" text-anchor="middle" class="box-title">Detection</text>
    <text x="135" y="388" text-anchor="middle" class="box-text-small">SEC filings alert</text>
    <text x="135" y="400" text-anchor="middle" class="box-text-small">antitrust agencies</text>
    <text x="135" y="412" text-anchor="middle" class="box-text-small">via news coverage,</text>
    <text x="135" y="424" text-anchor="middle" class="box-text-small">trade press, and</text>
    <text x="135" y="436" text-anchor="middle" class="box-text-small">monitoring</text>

    <!-- Arrow -->
    <line x1="220" y1="392" x2="265" y2="392" stroke="#1a4f8a" stroke-width="2" marker-end="url(#arrowhead)" />

    <!-- Evaluation -->
    <rect x="265" y="350" width="170" height="85" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="350" y="372" text-anchor="middle" class="box-title">Antitrust Review</text>
    <text x="350" y="388" text-anchor="middle" class="box-text-small">FTC/DOJ assess</text>
    <text x="350" y="400" text-anchor="middle" class="box-text-small">competitive effects</text>
    <text x="350" y="412" text-anchor="middle" class="box-text-small">using detailed</text>
    <text x="350" y="424" text-anchor="middle" class="box-text-small">market and</text>
    <text x="350" y="436" text-anchor="middle" class="box-text-small">transaction info</text>

    <!-- Arrow -->
    <line x1="435" y1="392" x2="480" y2="392" stroke="#1a4f8a" stroke-width="2" marker-end="url(#arrowhead)" />

    <!-- Enforcement decision -->
    <rect x="480" y="350" width="170" height="85" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="565" y="372" text-anchor="middle" class="box-title">Enforcement</text>
    <text x="565" y="388" text-anchor="middle" class="box-text-small">Challenge, block,</text>
    <text x="565" y="400" text-anchor="middle" class="box-text-small">or allow deal</text>
    <text x="565" y="412" text-anchor="middle" class="box-text-small">based on quality</text>
    <text x="565" y="424" text-anchor="middle" class="box-text-small">of available</text>
    <text x="565" y="436" text-anchor="middle" class="box-text-small">information</text>

    <!-- Arrow -->
    <line x1="650" y1="392" x2="695" y2="392" stroke="#1a4f8a" stroke-width="2" marker-end="url(#arrowhead)" />

    <!-- Firm response -->
    <rect x="695" y="350" width="175" height="85" rx="5" fill="#fef3e6" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="782.5" y="372" text-anchor="middle" class="box-title" fill="#bd5319">Firm Incentives</text>
    <text x="782.5" y="388" text-anchor="middle" class="box-text-small">Disclosure quality</text>
    <text x="782.5" y="400" text-anchor="middle" class="box-text-small">affects detection</text>
    <text x="782.5" y="412" text-anchor="middle" class="box-text-small">probability; firms</text>
    <text x="782.5" y="424" text-anchor="middle" class="box-text-small">adjust disclosure</text>
    <text x="782.5" y="436" text-anchor="middle" class="box-text-small">strategy</text>
  </g>

  <!-- Arrow from Level 3 to Level 4 -->
  <line x1="460" y1="435" x2="460" y2="465" stroke="#63605b" stroke-width="1.5" />
  <text x="475" y="453" class="arrow-label" font-size="10">Deterrence effect</text>

  <!-- LEVEL 4: OUTCOME -->
  <g id="level4">
    <rect x="30" y="470" width="860" height="2" fill="#d4d0c8" />
    <text x="30" y="460" class="section-label" font-size="10">LEVEL 4: OUTCOME</text>

    <!-- Undisclosed/silent mergers -->
    <rect x="50" y="480" width="160" height="90" rx="5" fill="#ffffff" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="130" y="505" text-anchor="middle" class="box-title" fill="#bd5319">Undisclosed Deals</text>
    <text x="130" y="521" text-anchor="middle" class="box-text-small">~$1.85 trillion</text>
    <text x="130" y="533" text-anchor="middle" class="box-text-small">(2002-2016)</text>
    <text x="130" y="545" text-anchor="middle" class="box-text-small">38% of all mergers</text>
    <text x="130" y="557" text-anchor="middle" class="box-text-small">Disproportionately</text>
    <text x="130" y="569" text-anchor="middle" class="box-text-small">horizontal</text>

    <!-- Deterred mergers (negative outcome) -->
    <rect x="240" y="480" width="160" height="90" rx="5" fill="#fef3e6" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="320" y="505" text-anchor="middle" class="box-title" fill="#bd5319">Deterred Deals</text>
    <text x="320" y="521" text-anchor="middle" class="box-text-small">Anticompetitive</text>
    <text x="320" y="533" text-anchor="middle" class="box-text-small">mergers not</text>
    <text x="320" y="545" text-anchor="middle" class="box-text-small">attempted due to</text>
    <text x="320" y="557" text-anchor="middle" class="box-text-small">expected regulatory</text>
    <text x="320" y="569" text-anchor="middle" class="box-text-small">scrutiny</text>

    <!-- Disclosed/completed mergers -->
    <rect x="430" y="480" width="160" height="90" rx="5" fill="#e8f0f7" stroke="#00356b" stroke-width="2" filter="url(#shadow)" />
    <text x="510" y="505" text-anchor="middle" class="box-title">Disclosed Deals</text>
    <text x="510" y="521" text-anchor="middle" class="box-text-small">Lower horizontal</text>
    <text x="510" y="533" text-anchor="middle" class="box-text-small">share relative to</text>
    <text x="510" y="545" text-anchor="middle" class="box-text-small">below-threshold</text>
    <text x="510" y="557" text-anchor="middle" class="box-text-small">deals (selection</text>
    <text x="510" y="569" text-anchor="middle" class="box-text-small">effect)</text>

    <!-- Market outcomes -->
    <rect x="620" y="480" width="160" height="90" rx="5" fill="#ffffff" stroke="#00356b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="700" y="505" text-anchor="middle" class="box-title">Market Outcomes</text>
    <text x="700" y="521" text-anchor="middle" class="box-text-small">Higher disclosure</text>
    <text x="700" y="533" text-anchor="middle" class="box-text-small">improves detection</text>
    <text x="700" y="545" text-anchor="middle" class="box-text-small">of anticompetitive</text>
    <text x="700" y="557" text-anchor="middle" class="box-text-small">deals and may</text>
    <text x="700" y="569" text-anchor="middle" class="box-text-small">reduce overall</text>

    <!-- Policy implications -->
    <rect x="810" y="480" width="100" height="90" rx="5" fill="#fef3e6" stroke="#bd5319" stroke-width="2" filter="url(#shadow)" />
    <text x="860" y="505" text-anchor="middle" class="box-title" fill="#bd5319">Policy Tension</text>
    <text x="860" y="521" text-anchor="middle" class="box-text-small">SEC vs. FTC/DOJ</text>
    <text x="860" y="533" text-anchor="middle" class="box-text-small">incentives</text>
    <text x="860" y="545" text-anchor="middle" class="box-text-small">diverge on</text>
    <text x="860" y="557" text-anchor="middle" class="box-text-small">merger info</text>
    <text x="860" y="569" text-anchor="middle" class="box-text-small">disclosure</text>
  </g>

  <!-- Key insight box at bottom -->
  <rect x="30" y="600" width="860" height="80" rx="5" fill="#f9f7f4" stroke="#00356b" stroke-width="2" filter="url(#shadow)" />
  <text x="50" y="625" class="box-title" font-size="12">Key Mechanism Insight:</text>
  <text x="50" y="643" class="box-text">Mandatory SEC disclosure requirements create a strategic disclosure mechanism. When firms must publicly disclose</text>
  <text x="50" y="658" class="box-text">merger details, antitrust authorities gain information to detect and challenge anticompetitive deals. This causes firms to</text>
  <text x="50" y="673" class="box-text">strategically avoid disclosure (silence) or understate risks for high-risk horizontal mergers, leading to "midnight mergers."</text>
</svg>