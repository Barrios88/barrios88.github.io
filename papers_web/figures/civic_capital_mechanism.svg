<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Define styles -->
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 600; fill: #00356b; }
      .box-title { font-size: 13px; font-weight: 600; fill: #00356b; }
      .box-text { font-size: 11px; fill: #3a3632; line-height: 1.4; }
      .arrow-text { font-size: 10px; fill: #63605b; font-style: italic; }
      .connection-line { stroke: #1a4f8a; stroke-width: 2; fill: none; }
      .arrow-head { fill: #1a4f8a; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#f9f7f4" stroke="none"/>

  <!-- Title -->
  <text x="450" y="30" class="title" text-anchor="middle">Civic Capital and Pandemic Responses: The Causal Mechanism</text>

  <!-- ============ LEFT COLUMN: CIVIC CAPITAL MEASURES ============ -->

  <!-- Voter Turnout Box -->
  <rect x="20" y="70" width="140" height="100" fill="#ffffff" stroke="#00356b" stroke-width="2" rx="2"/>
  <text x="35" y="90" class="box-title">Voter Turnout</text>
  <text x="35" y="110" class="box-text">Historical</text>
  <text x="35" y="125" class="box-text">participation in</text>
  <text x="35" y="140" class="box-text">presidential</text>
  <text x="35" y="155" class="box-text">elections</text>

  <!-- Census Response Rate Box -->
  <rect x="20" y="190" width="140" height="100" fill="#ffffff" stroke="#00356b" stroke-width="2" rx="2"/>
  <text x="35" y="210" class="box-title">Census</text>
  <text x="35" y="225" class="box-title">Response</text>
  <text x="35" y="245" class="box-text">Mail-in response</text>
  <text x="35" y="260" class="box-text">rates to decennial</text>
  <text x="35" y="275" class="box-text">census</text>

  <!-- Community Orgs Box -->
  <rect x="20" y="310" width="140" height="100" fill="#ffffff" stroke="#00356b" stroke-width="2" rx="2"/>
  <text x="35" y="330" class="box-title">Community</text>
  <text x="35" y="345" class="box-title">Organizations</text>
  <text x="35" y="365" class="box-text">Density of civic,</text>
  <text x="35" y="380" class="box-text">business, and</text>
  <text x="35" y="395" class="box-text">non-profit orgs</text>

  <!-- ============ MIDDLE COLUMN: CIVIC CAPITAL AGGREGATE ============ -->

  <!-- Civic Capital Synthesis Box -->
  <rect x="220" y="150" width="200" height="180" fill="#1a4f8a" stroke="#00356b" stroke-width="2" rx="3"/>
  <text x="320" y="175" class="title" text-anchor="middle" fill="#ffffff">Civic Capital</text>
  <text x="320" y="200" style="font-size: 11px; fill: #ffffff; text-anchor: middle; line-height: 1.5;">
    <tspan x="320" dy="0">Aggregate of shared values,</tspan>
    <tspan x="320" dy="14">norms of reciprocity, and</tspan>
    <tspan x="320" dy="14">capacity for collective action</tspan>
  </text>
  <text x="320" y="260" style="font-size: 10px; fill: #f9f7f4; text-anchor: middle; font-style: italic;">
    <tspan x="320" dy="0">Values + Beliefs that help</tspan>
    <tspan x="320" dy="12">overcome free-rider problem</tspan>
  </text>

  <!-- Arrows from civic measures to aggregate -->
  <path d="M 160 120 L 220 200" class="connection-line" marker-end="url(#arrowhead)"/>
  <path d="M 160 240 L 220 240" class="connection-line" marker-end="url(#arrowhead)"/>
  <path d="M 160 360 L 220 280" class="connection-line" marker-end="url(#arrowhead)"/>

  <!-- Arrow definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow-head"/>
    </marker>
  </defs>

  <!-- ============ RIGHT COLUMN: BEHAVIORAL OUTCOMES ============ -->

  <!-- Social Distancing Box -->
  <rect x="560" y="70" width="150" height="110" fill="#ffffff" stroke="#bd5319" stroke-width="2" rx="2"/>
  <text x="575" y="95" class="box-title" fill="#bd5319">↓ Mobility</text>
  <text x="575" y="115" class="box-text">10-15% greater</text>
  <text x="575" y="130" class="box-text">reduction in</text>
  <text x="575" y="145" class="box-text">distance traveled</text>
  <text x="575" y="160" class="box-text">and retail visits</text>

  <!-- Mask Wearing Box -->
  <rect x="560" y="210" width="150" height="110" fill="#ffffff" stroke="#bd5319" stroke-width="2" rx="2"/>
  <text x="575" y="235" class="box-title" fill="#bd5319">↑ Protective</text>
  <text x="575" y="250" class="box-title" fill="#bd5319">Behaviors</text>
  <text x="575" y="270" class="box-text">Higher mask</text>
  <text x="575" y="285" class="box-text">usage rates,</text>
  <text x="575" y="300" class="box-text">fewer social</text>
  <text x="575" y="315" class="box-text">contacts</text>

  <!-- Sustained Compliance Box -->
  <rect x="560" y="350" width="150" height="110" fill="#ffffff" stroke="#bd5319" stroke-width="2" rx="2"/>
  <text x="575" y="375" class="box-title" fill="#bd5319">↑ Sustained</text>
  <text x="575" y="390" class="box-title" fill="#bd5319">Compliance</text>
  <text x="575" y="410" class="box-text">Maintained</text>
  <text x="575" y="425" class="box-text">distancing even</text>
  <text x="575" y="440" class="box-text">after restrictions</text>
  <text x="575" y="455" class="box-text">lifted</text>

  <!-- Arrows from civic capital to outcomes -->
  <path d="M 420 210 L 560 125" class="connection-line" marker-end="url(#arrowhead)"/>
  <path d="M 420 240 L 560 265" class="connection-line" marker-end="url(#arrowhead)"/>
  <path d="M 420 270 L 560 405" class="connection-line" marker-end="url(#arrowhead)"/>

  <!-- ============ BOTTOM MECHANISTIC PATHWAY ============ -->

  <!-- Mechanism boxes -->
  <rect x="250" y="400" width="160" height="65" fill="#f9f7f4" stroke="#63605b" stroke-width="1.5" stroke-dasharray="5,5" rx="2"/>
  <text x="330" y="420" style="font-size: 11px; font-weight: 600; fill: #3a3632; text-anchor: middle;">Mechanism 1:</text>
  <text x="330" y="437" style="font-size: 10px; fill: #3a3632; text-anchor: middle;">Internalize</text>
  <text x="330" y="450" style="font-size: 10px; fill: #3a3632; text-anchor: middle;">Externalities</text>

  <rect x="490" y="400" width="160" height="65" fill="#f9f7f4" stroke="#63605b" stroke-width="1.5" stroke-dasharray="5,5" rx="2"/>
  <text x="570" y="420" style="font-size: 11px; font-weight: 600; fill: #3a3632; text-anchor: middle;">Mechanism 2:</text>
  <text x="570" y="437" style="font-size: 10px; fill: #3a3632; text-anchor: middle;">Expect Others to</text>
  <text x="570" y="450" style="font-size: 10px; fill: #3a3632; text-anchor: middle;">Comply Too</text>

  <!-- Connecting lines from civic capital to mechanisms -->
  <line x1="320" y1="330" x2="330" y2="400" class="connection-line" stroke-dasharray="3,3"/>
  <line x1="320" y1="330" x2="570" y2="400" class="connection-line" stroke-dasharray="3,3"/>

  <!-- Bottom explanatory text -->
  <text x="450" y="475" style="font-size: 9px; fill: #63605b; text-anchor: middle; font-style: italic;">
    Civic Capital enables voluntary compliance through shared values and mutual expectations of cooperation
  </text>

</svg>
