<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" width="900" height="480" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#bd5319"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1a4f8a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#f9f7f4"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#00356b">Mechanism: 150-Hour Rule, Supply, and Quality</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#63605b">Two competing theories tested against the evidence</text>

  <!-- INTERVENTION BOX -->
  <rect x="330" y="70" width="240" height="65" fill="#00356b" rx="6"/>
  <text x="450" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#f9f7f4">150-Hour Rule</text>
  <text x="450" y="115" text-anchor="middle" font-size="11" fill="#d4cfc8">Extra 30 credit hours required for CPA license</text>

  <!-- Arrow down to effects -->
  <path d="M 400 135 L 250 175" stroke="#bd5319" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 500 135 L 650 175" stroke="#1a4f8a" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- LEFT: Supply Effects -->
  <rect x="70" y="175" width="340" height="130" fill="#ffffff" stroke="#bd5319" stroke-width="2" rx="6"/>
  <text x="240" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#bd5319">Supply Effects (Strong)</text>

  <text x="90" y="225" font-size="12" fill="#3a3632" font-weight="500">First-time CPA candidates</text>
  <text x="350" y="225" text-anchor="end" font-size="13" font-weight="700" fill="#bd5319">-15%</text>

  <line x1="90" y1="237" x2="390" y2="237" stroke="#e8e3db" stroke-width="1"/>

  <text x="90" y="255" font-size="12" fill="#3a3632" font-weight="500">Low-type candidates (fail all 4)</text>
  <text x="350" y="255" text-anchor="end" font-size="13" font-weight="700" fill="#bd5319">-36%</text>

  <line x1="90" y1="267" x2="390" y2="267" stroke="#e8e3db" stroke-width="1"/>

  <text x="90" y="285" font-size="12" fill="#3a3632" font-weight="500">High-type candidates (pass all 4)</text>
  <text x="350" y="285" text-anchor="end" font-size="13" font-weight="700" fill="#bd5319">-23%</text>

  <line x1="90" y1="297" x2="390" y2="297" stroke="#e8e3db" stroke-width="1"/>

  <!-- RIGHT: Quality Effects -->
  <rect x="490" y="175" width="340" height="130" fill="#ffffff" stroke="#1a4f8a" stroke-width="2" rx="6"/>
  <text x="660" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#1a4f8a">Quality Effects (Null)</text>

  <text x="510" y="225" font-size="12" fill="#3a3632" font-weight="500">Time to promotion</text>
  <text x="780" y="225" text-anchor="end" font-size="13" font-weight="700" fill="#63605b">No diff.</text>

  <line x1="510" y1="237" x2="810" y2="237" stroke="#e8e3db" stroke-width="1"/>

  <text x="510" y="255" font-size="12" fill="#3a3632" font-weight="500">Tenure at firm</text>
  <text x="780" y="255" text-anchor="end" font-size="13" font-weight="700" fill="#63605b">No diff.</text>

  <line x1="510" y1="267" x2="810" y2="267" stroke="#e8e3db" stroke-width="1"/>

  <text x="510" y="285" font-size="12" fill="#3a3632" font-weight="500">Exit rate from public accounting</text>
  <text x="780" y="285" text-anchor="end" font-size="13" font-weight="700" fill="#63605b">No diff.</text>

  <line x1="510" y1="297" x2="810" y2="297" stroke="#e8e3db" stroke-width="1"/>

  <!-- Arrows down to implications -->
  <path d="M 240 305 L 240 340" stroke="#bd5319" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 660 305 L 660 340" stroke="#1a4f8a" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- BOTTOM: Implication boxes -->
  <rect x="70" y="340" width="340" height="55" fill="#bd5319" rx="5"/>
  <text x="240" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#f9f7f4">Supply Restriction</text>
  <text x="240" y="382" text-anchor="middle" font-size="11" fill="#f0ddd4">Fewer entrants — both high and low ability</text>

  <rect x="490" y="340" width="340" height="55" fill="#63605b" rx="5"/>
  <text x="660" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#f9f7f4">No Quality Gain</text>
  <text x="660" y="382" text-anchor="middle" font-size="11" fill="#d4cfc8">Career outcomes unchanged for rule CPAs</text>

  <!-- Bottom conclusion -->
  <rect x="100" y="415" width="700" height="50" fill="#ffffff" stroke="#00356b" stroke-width="2" rx="5"/>
  <text x="450" y="436" text-anchor="middle" font-size="13" font-weight="700" fill="#00356b">Conclusion: Consistent with Friedman's View</text>
  <text x="450" y="454" text-anchor="middle" font-size="11" fill="#3a3632">Licensing requirements restrict supply and do little to improve quality in the labor market</text>
</svg>
