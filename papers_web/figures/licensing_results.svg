<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" width="1000" height="620">
  <defs>
    <style>
      .title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #00356b; }
      .subtitle { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; fill: #63605b; }
      .panel-title { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #00356b; }
      .axis-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 11px; fill: #63605b; }
      .data-label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #00356b; }
      .note-text { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 10px; fill: #63605b; font-style: italic; }
      .bar-value { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; font-weight: 600; }
      .grid { stroke: #e8e3db; stroke-width: 1; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bd5319"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="620" fill="#f9f7f4"/>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" class="title">Key Results: 150-Hour Rule and the Accounting Profession</text>
  <text x="500" y="55" text-anchor="middle" class="subtitle">Staggered difference-in-differences across U.S. states | JAR 60(1), 2022</text>

  <!-- ═══════════ Panel A: Supply Reduction ═══════════ -->
  <rect x="40" y="80" width="290" height="250" fill="#ffffff" stroke="#d4cfc8" stroke-width="1.5" rx="4"/>
  <text x="185" y="105" text-anchor="middle" class="panel-title">Panel A: Supply of CPA Candidates</text>

  <!-- Y-axis -->
  <line x1="85" y1="125" x2="85" y2="300" stroke="#63605b" stroke-width="1.5"/>
  <line x1="85" y1="300" x2="310" y2="300" stroke="#63605b" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="85" y1="265" x2="310" y2="265" class="grid" stroke-dasharray="3,3"/>
  <line x1="85" y1="230" x2="310" y2="230" class="grid" stroke-dasharray="3,3"/>
  <line x1="85" y1="195" x2="310" y2="195" class="grid" stroke-dasharray="3,3"/>
  <line x1="85" y1="160" x2="310" y2="160" class="grid" stroke-dasharray="3,3"/>

  <!-- Y labels -->
  <text x="78" y="304" text-anchor="end" class="axis-label">0%</text>
  <text x="78" y="234" text-anchor="end" class="axis-label">-10%</text>
  <text x="78" y="164" text-anchor="end" class="axis-label">-20%</text>

  <!-- Bars -->
  <rect x="115" y="135" width="65" height="165" fill="#00356b" rx="3"/>
  <text x="148" y="128" text-anchor="middle" class="bar-value" fill="#00356b">Baseline</text>

  <rect x="225" y="185" width="65" height="115" fill="#bd5319" rx="3"/>
  <text x="258" y="178" text-anchor="middle" class="bar-value" fill="#bd5319">-15%</text>

  <!-- X labels -->
  <text x="148" y="318" text-anchor="middle" class="axis-label">Before Rule</text>
  <text x="258" y="318" text-anchor="middle" class="axis-label">After Rule</text>

  <!-- ═══════════ Panel B: Compositional Change ═══════════ -->
  <rect x="355" y="80" width="290" height="250" fill="#ffffff" stroke="#d4cfc8" stroke-width="1.5" rx="4"/>
  <text x="500" y="105" text-anchor="middle" class="panel-title">Panel B: Who Leaves the Pipeline?</text>

  <!-- Two sub-bars showing both types decline -->
  <text x="375" y="148" class="axis-label" font-weight="500">Low-Type Candidates</text>
  <text x="375" y="162" class="axis-label">(Fail all 4 sections)</text>
  <rect x="375" y="172" width="210" height="20" fill="#1a4f8a" rx="2"/>
  <text x="595" y="187" class="data-label" fill="#1a4f8a">-36%</text>

  <text x="375" y="218" class="axis-label" font-weight="500">High-Type Candidates</text>
  <text x="375" y="232" class="axis-label">(Pass all 4 sections)</text>
  <rect x="375" y="242" width="140" height="20" fill="#bd5319" rx="2"/>
  <text x="525" y="257" class="data-label" fill="#bd5319">-23%</text>

  <!-- Insight box -->
  <rect x="370" y="280" width="260" height="38" fill="#fff3e0" stroke="#d97633" stroke-width="1" rx="3"/>
  <text x="500" y="296" text-anchor="middle" class="note-text" fill="#92400e" font-style="normal" font-weight="600">Both high- and low-ability candidates</text>
  <text x="500" y="308" text-anchor="middle" class="note-text" fill="#3a3632">leave the pipeline, complicating quality inference</text>

  <!-- ═══════════ Panel C: Quality Outcomes ═══════════ -->
  <rect x="670" y="80" width="290" height="250" fill="#ffffff" stroke="#d4cfc8" stroke-width="1.5" rx="4"/>
  <text x="815" y="105" text-anchor="middle" class="panel-title">Panel C: Labor Market Quality Proxies</text>

  <!-- Quality metrics -->
  <rect x="690" y="130" width="250" height="55" fill="#f0f4f8" stroke="#d4cfc8" stroke-width="1" rx="4"/>
  <text x="815" y="152" text-anchor="middle" class="axis-label" font-weight="600" fill="#00356b">Time to Promotion</text>
  <text x="815" y="176" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#63605b">No Significant Difference</text>

  <rect x="690" y="198" width="250" height="55" fill="#f0f4f8" stroke="#d4cfc8" stroke-width="1" rx="4"/>
  <text x="815" y="220" text-anchor="middle" class="axis-label" font-weight="600" fill="#00356b">Tenure at Firm</text>
  <text x="815" y="244" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#63605b">No Significant Difference</text>

  <rect x="690" y="266" width="250" height="55" fill="#f0f4f8" stroke="#d4cfc8" stroke-width="1" rx="4"/>
  <text x="815" y="288" text-anchor="middle" class="axis-label" font-weight="600" fill="#00356b">Time to Partnership</text>
  <text x="815" y="312" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#63605b">No Significant Difference</text>

  <!-- ═══════════ Bottom: Professional Commitment ═══════════ -->
  <rect x="40" y="360" width="920" height="120" fill="#ffffff" stroke="#d4cfc8" stroke-width="1.5" rx="4"/>
  <text x="500" y="388" text-anchor="middle" class="panel-title">Panel D: Professional Commitment and Communication</text>

  <!-- Commitment metrics - horizontal layout -->
  <rect x="65" y="405" width="265" height="55" fill="#f0f4f8" stroke="#d4cfc8" stroke-width="1" rx="4"/>
  <text x="197" y="425" text-anchor="middle" class="axis-label" font-weight="600" fill="#00356b">Exit Rate from Public Accounting</text>
  <text x="197" y="448" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#63605b">Similar across groups</text>

  <rect x="368" y="405" width="265" height="55" fill="#f0f4f8" stroke="#d4cfc8" stroke-width="1" rx="4"/>
  <text x="500" y="425" text-anchor="middle" class="axis-label" font-weight="600" fill="#00356b">Time in Public Accounting</text>
  <text x="500" y="448" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#63605b">Comparable timelines</text>

  <rect x="670" y="405" width="265" height="55" fill="#f0f4f8" stroke="#d4cfc8" stroke-width="1" rx="4"/>
  <text x="803" y="425" text-anchor="middle" class="axis-label" font-weight="600" fill="#00356b">Written Communication Quality</text>
  <text x="803" y="448" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#63605b">No difference detected</text>

  <!-- Key takeaway -->
  <rect x="120" y="510" width="760" height="50" fill="#f9f7f4" stroke="#00356b" stroke-width="1.5" rx="4"/>
  <text x="500" y="532" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#00356b">Key Finding:</text>
  <text x="500" y="550" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#3a3632">15% fewer CPAs — including high-ability candidates — with no detectable quality improvement in labor market outcomes</text>

  <!-- Footer -->
  <text x="500" y="608" text-anchor="middle" class="note-text">Data: NASBA first-time test-takers (university level) and 23,000+ CPA career histories. Journal of Accounting Research, 60(1), 2022.</text>
</svg>
