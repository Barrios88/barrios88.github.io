<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #00356b; }
      .subtitle { font-size: 13px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #63605b; }
      .section-label { font-size: 12px; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #00356b; }
      .box-title { font-size: 13px; font-weight: 700; font-family: 'Helvetica Neue', Arial, sans-serif; }
      .box-text { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #f9f7f4; }
      .box-text-small { font-size: 10px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #f9f7f4; }
      .result-text { font-size: 10px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #63605b; }
      .arrow-label { font-size: 11px; font-family: 'Helvetica Neue', Arial, sans-serif; fill: #1a4f8a; font-weight: 600; }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00356b" />
    </marker>

    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="#ffffff"/>

  <!-- Title Section -->
  <rect x="20" y="15" width="860" height="65" fill="#f9f7f4" stroke="#63605b" stroke-width="1.5" rx="6"/>
  <text x="450" y="42" text-anchor="middle" class="title">Mechanism: Gig Economy and Entrepreneurial Entry</text>
  <text x="450" y="62" text-anchor="middle" class="subtitle">Barrios, Hochberg, and Yi (JFE 2022)</text>

  <!-- Causal Chain Section -->
  <text x="30" y="105" class="section-label">CAUSAL CHAIN</text>

  <!-- Box 1: Gig Platform Entry -->
  <rect x="30" y="120" width="160" height="90" fill="#1a4f8a" stroke="#00356b" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="110" y="140" text-anchor="middle" class="box-title" fill="#ffffff">Gig Platform</text>
  <text x="110" y="157" text-anchor="middle" class="box-title" fill="#ffffff">Entry</text>
  <text x="110" y="177" text-anchor="middle" class="box-text">
    <tspan x="110" class="box-text-small">Uber/Lyft</tspan>
    <tspan x="110" dy="14" class="box-text-small">arrive in city</tspan>
  </text>

  <!-- Arrow 1 -->
  <line x1="200" y1="165" x2="235" y2="165" stroke="#00356b" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Flexible Income -->
  <rect x="235" y="120" width="160" height="90" fill="#bd5319" stroke="#a84912" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="315" y="140" text-anchor="middle" class="box-title" fill="#ffffff">Flexible Income</text>
  <text x="315" y="157" text-anchor="middle" class="box-title" fill="#ffffff">Opportunity</text>
  <text x="315" y="177" text-anchor="middle" class="box-text">
    <tspan x="315" class="box-text-small">Work own</tspan>
    <tspan x="315" dy="14" class="box-text-small">schedule, low</tspan>
    <tspan x="315" dy="14" class="box-text-small">barriers</tspan>
  </text>

  <!-- Arrow 2 -->
  <line x1="405" y1="165" x2="440" y2="165" stroke="#00356b" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Reduced Risk -->
  <rect x="440" y="120" width="160" height="90" fill="#1a4f8a" stroke="#00356b" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="520" y="140" text-anchor="middle" class="box-title" fill="#ffffff">Reduced</text>
  <text x="520" y="157" text-anchor="middle" class="box-title" fill="#ffffff">Downside Risk</text>
  <text x="520" y="177" text-anchor="middle" class="box-text">
    <tspan x="520" class="box-text-small">Income insurance</tspan>
    <tspan x="520" dy="14" class="box-text-small">for entrepreneurs</tspan>
  </text>

  <!-- Arrow 3 -->
  <line x1="610" y1="165" x2="645" y2="165" stroke="#00356b" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Increased Entrepreneurship -->
  <rect x="645" y="120" width="160" height="90" fill="#bd5319" stroke="#a84912" stroke-width="2" rx="8" filter="url(#shadow)"/>
  <text x="725" y="138" text-anchor="middle" class="box-title" fill="#ffffff">Increased</text>
  <text x="725" y="155" text-anchor="middle" class="box-title" fill="#ffffff">Entrepreneurial</text>
  <text x="725" y="172" text-anchor="middle" class="box-title" fill="#ffffff">Entry</text>
  <text x="725" y="192" text-anchor="middle" class="box-text">
    <tspan x="725" class="box-text-small">+4-6% new</tspan>
    <tspan x="725" dy="12" class="box-text-small">business regs</tspan>
  </text>

  <!-- Identification Strategy Section -->
  <text x="30" y="235" class="section-label">IDENTIFICATION STRATEGY</text>

  <!-- ID Box 1: Staggered Rollout -->
  <rect x="30" y="250" width="200" height="85" fill="#f9f7f4" stroke="#1a4f8a" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="130" y="270" text-anchor="middle" class="box-title" fill="#00356b">Staggered Rollout</text>
  <text x="130" y="290" text-anchor="middle" class="result-text">
    <tspan x="130">~195 US cities</tspan>
    <tspan x="130" dy="12">2009-2016</tspan>
    <tspan x="130" dy="12">Uber/Lyft launches</tspan>
  </text>

  <!-- ID Box 2: DiD Design -->
  <rect x="250" y="250" width="200" height="85" fill="#f9f7f4" stroke="#1a4f8a" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="350" y="270" text-anchor="middle" class="box-title" fill="#00356b">Difference-in-Differences</text>
  <text x="350" y="290" text-anchor="middle" class="result-text">
    <tspan x="350">Timing is not random</tspan>
    <tspan x="350" dy="12">but predictable by</tspan>
    <tspan x="350" dy="12">local characteristics</tspan>
  </text>

  <!-- ID Box 3: Heterogeneity -->
  <rect x="470" y="250" width="240" height="85" fill="#f9f7f4" stroke="#1a4f8a" stroke-width="1.5" rx="8" filter="url(#shadow)"/>
  <text x="590" y="270" text-anchor="middle" class="box-title" fill="#00356b">Key Heterogeneity</text>
  <text x="590" y="290" text-anchor="middle" class="result-text">
    <tspan x="590">Effects strongest in areas with</tspan>
    <tspan x="590" dy="12">higher economic uncertainty</tspan>
    <tspan x="590" dy="12">+3pp larger effect in high volatility</tspan>
  </text>

  <!-- Key Results Section -->
  <text x="30" y="360" class="section-label">KEY RESULTS &amp; MAGNITUDES</text>

  <!-- Results Container -->
  <rect x="30" y="375" width="840" height="80" fill="#f9f7f4" stroke="#00356b" stroke-width="1.5" rx="8" filter="url(#shadow)"/>

  <!-- Result 1 -->
  <g>
    <rect x="40" y="383" width="240" height="64" fill="#ffffff" stroke="#bd5319" stroke-width="1" rx="6"/>
    <text x="160" y="403" text-anchor="middle" class="box-title" fill="#00356b">New Business Registrations</text>
    <text x="160" y="423" text-anchor="middle" style="font-size: 18px; font-weight: bold; fill: #bd5319;">+5%</text>
    <text x="160" y="441" text-anchor="middle" class="result-text">per platform entry</text>
  </g>

  <!-- Result 2 -->
  <g>
    <rect x="300" y="383" width="240" height="64" fill="#ffffff" stroke="#bd5319" stroke-width="1" rx="6"/>
    <text x="420" y="403" text-anchor="middle" class="box-title" fill="#00356b">Small Business Lending</text>
    <text x="420" y="423" text-anchor="middle" style="font-size: 18px; font-weight: bold; fill: #bd5319;">+5%</text>
    <text x="420" y="441" text-anchor="middle" class="result-text">to newly registered firms</text>
  </g>

  <!-- Result 3 -->
  <g>
    <rect x="560" y="383" width="240" height="64" fill="#ffffff" stroke="#bd5319" stroke-width="1" rx="6"/>
    <text x="680" y="403" text-anchor="middle" class="box-title" fill="#00356b">Entrepreneurship Searches</text>
    <text x="680" y="423" text-anchor="middle" style="font-size: 18px; font-weight: bold; fill: #bd5319;">+7%</text>
    <text x="680" y="441" text-anchor="middle" class="result-text">Google search interest</text>
  </g>

</svg>