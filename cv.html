<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae — John Manuel Barrios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --yale-blue:       #00356b;
            --yale-blue-dark:  #002244;
            --yale-blue-mid:   #1a4f8a;
            --yale-gray-warm:  #63605b;
            --yale-gray-light: #b0ada7;
            --yale-cream:      #f9f7f4;
            --yale-rule:       #d4d0c8;
            --yale-accent:     #bd5319;
            --white:           #ffffff;
            --text-body:       #1f1d1b;
            --text-light:      #5c5854;
            --surface:         #faf9f7;
            --surface-elevated: #ffffff;
            --border:          #e8e6e2;
            --shadow-sm:       0 1px 3px rgba(0,53,107,0.06);
            --shadow-md:       0 4px 12px rgba(0,53,107,0.08);
            --shadow-lg:       0 12px 40px rgba(0,53,107,0.1);
            --radius-sm:       6px;
            --radius-md:       10px;
            --radius-lg:       16px;
            --transition:      0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-body);
            background: var(--surface);
            line-height: 1.65;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: 'Crimson Pro', Georgia, serif;
            font-weight: 600;
            color: var(--yale-blue);
        }

        a { color: var(--yale-blue); text-decoration: none; transition: color var(--transition), border-color var(--transition), background var(--transition); }
        a:hover { color: var(--yale-accent); }

        /* ── Top accent bar ── */
        .topbar {
            height: 3px;
            background: linear-gradient(90deg, var(--yale-blue) 0%, var(--yale-blue-mid) 50%, var(--yale-accent) 100%);
            background-size: 200% 100%;
        }

        /* ── Header ── */
        header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .site-name {
            font-family: 'Crimson Pro', Georgia, serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--yale-blue);
            letter-spacing: -0.02em;
        }
        .site-name a { color: var(--yale-blue); }

        nav ul { list-style: none; display: flex; gap: 2.25rem; }
        nav a {
            color: var(--yale-gray-warm);
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.35rem 0;
            border-bottom: 2px solid transparent;
            transition: color var(--transition), border-color var(--transition);
        }
        nav a:hover, nav a.active {
            color: var(--yale-blue);
            border-bottom-color: var(--yale-blue);
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--yale-blue);
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        /* ── Page Title ── */
        .page-title-area {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 1.25rem;
        }
        .page-title-area h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* ── CV Content ── */
        .cv-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1.5rem 3.5rem;
        }

        .download-section {
            background: var(--surface-elevated);
            padding: 1.5rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            transition: box-shadow var(--transition);
        }

        .download-section:hover { box-shadow: var(--shadow-md); }

        .download-info {
            flex: 1;
        }

        .download-info p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--white);
            background: var(--yale-blue);
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: var(--radius-sm);
            transition: background var(--transition), transform 0.15s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--yale-blue-dark);
            color: var(--white);
            transform: translateY(-1px);
        }

        .pdf-viewer {
            width: 100%;
            height: calc(100vh - 250px);
            min-height: 600px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--yale-cream);
        }

        .pdf-fallback {
            background: var(--surface-elevated);
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
        }

        .pdf-fallback h2 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .pdf-fallback p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0;
        }

        /* ── Footer ── */
        footer {
            border-top: 1px solid var(--border);
            background: var(--surface-elevated);
            text-align: center;
            padding: 1.5rem 1.5rem;
            font-size: 0.78rem;
            color: var(--yale-gray-light);
        }
        footer a { color: var(--yale-gray-warm); }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .nav-toggle { display: block; }
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 64px; left: 0; right: 0;
                background: rgba(255,255,255,0.98);
                backdrop-filter: blur(12px);
                padding: 1rem 1.5rem;
                gap: 0.5rem;
                border-bottom: 1px solid var(--border);
                box-shadow: var(--shadow-md);
            }
            nav ul.show { display: flex; }
            .header-inner { position: relative; }
            .page-title-area h1 { font-size: 1.5rem; }
            .download-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="topbar"></div>

    <header>
        <div class="header-inner">
            <div class="site-name"><a href="index.html">John Manuel Barrios</a></div>
            <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('nav ul').classList.toggle('show')">
                <i class="fa-solid fa-bars"></i>
            </button>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="research.html">Research</a></li>
                    <li><a href="cv.html" class="active">CV</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="page-title-area">
        <h1>Curriculum Vitae</h1>
    </div>

    <hr class="divider" style="max-width:1100px; margin:0 auto;">

    <main class="cv-content" style="padding-top:2rem;">
        <div class="download-section">
            <div class="download-info">
                <h2 style="margin:0; font-size:1.1rem; color:var(--yale-blue);">Download CV</h2>
                <p>Updated May 2026</p>
            </div>
            <a href="cv/CV_latest.pdf" download class="btn">
                <i class="fa-solid fa-download"></i> Download PDF
            </a>
        </div>

        <iframe
            src="cv/CV_latest.pdf#view=FitH"
            class="pdf-viewer"
            title="John Manuel Barrios - Curriculum Vitae">
        </iframe>

        <noscript>
            <div class="pdf-fallback">
                <h2>PDF Viewer Not Available</h2>
                <p>Your browser does not support embedded PDFs.</p>
                <a href="cv/CV_latest.pdf" download class="btn">
                    <i class="fa-solid fa-download"></i> Download CV (PDF)
                </a>
            </div>
        </noscript>
    </main>

    <footer>
        &copy; 2026 John Manuel Barrios &middot; Yale School of Management
    </footer>

</body>
</html>
