          - generic [ref=e43]: About
          - paragraph [ref=e44]:
            - text: I am an Associate Professor of Accounting at the
            - link "Yale School of Management" [ref=e45] [cursor=pointer]:
              - /url: https://som.yale.edu/
            - text: and a Faculty Research Fellow at the
            - link "National Bureau of Economic Research" [ref=e46] [cursor=pointer]:
              - /url: https://www.nber.org/
            - text: in the Political Economy and the Productivity, Innovation, and Entrepreneurship groups.
          - paragraph [ref=e47]:
            - text: My research examines new business formation, culture and economic behavior, human capital, financial reporting, regulation, managerial incentives, and corporate governance. My work has been published in leading accounting, economics, and finance journals, including the
            - emphasis [ref=e48]: Journal of Accounting Research
            - text: ", the"
            - emphasis [ref=e49]: Journal of Public Economics
            - text: ","
            - emphasis [ref=e50]: "American Economic Journal: Microeconomics"
            - text: ","
            - emphasis [ref=e51]: Management Science
            - text: ", and the"
            - emphasis [ref=e52]: Journal of Financial Economics
            - text: ", and has been covered by"
            - emphasis [ref=e53]: The Economist
            - text: ", the"
            - emphasis [ref=e54]: Wall Street Journal
            - text: ", and"
            - emphasis [ref=e55]: Fortune
            - text: ", among others (see"
            - link "Media" [ref=e56] [cursor=pointer]:
              - /url: media.html
            - text: ).
          - paragraph [ref=e57]:
            - text: I currently serve as Editor of
            - emphasis [ref=e58]: Accounting Horizons
            - text: ", Ad Hoc Advising Editor at the"
            - emphasis [ref=e59]: Journal of Accounting and Economics
            - text: ", and Guest Editor for the"
            - emphasis [ref=e60]: Journal of Labor Economics
            - text: Symposium on Occupational Licensing. I am one of the co-founders of the
            - link "Labor and Accounting Group" [ref=e61] [cursor=pointer]:
              - /url: labor-accounting.html
            - text: ", a community of researchers working at the intersection of labor economics and accounting, and I frequently present at the American Economic Association Annual Meeting and the NBER Summer Institute."
          - paragraph [ref=e62]: Before joining Yale SOM, I was an Assistant Professor of Accounting and Fujimori/Mou Faculty Scholar at the University of Chicago Booth School of Business, and an Assistant Professor at the Olin Business School at Washington University in St. Louis.
          - paragraph [ref=e63]:
            - text: At Yale SOM, I teach Financial Accounting and Valuation, and
            - link "The Private Firm CFO" [ref=e64] [cursor=pointer]:
              - /url: /mgt816-private-firm-cfo/
            - text: (MGT 816). Outside of academia, I enjoy reading history and politics, cooking, and wine.
