      - heading "John Manuel Barrios" [level=1] [ref=e18]
      - paragraph [ref=e19]: Associate Professor of Accounting, Yale School of Management Faculty Research Fellow, National Bureau of Economic Research
      - paragraph [ref=e20]: "My work sits at the intersection of accounting, labor economics, entrepreneurship, political economy, and antitrust. I study how accounting information and the rules that govern it shape firms and the people who run them: who enters the profession, who starts a business, how politics colors the way people read and act on the numbers, and how capital market disclosure regulation intersects with antitrust enforcement."
