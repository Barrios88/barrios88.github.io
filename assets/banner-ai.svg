<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- terminal panels -->
  <g fill="none" stroke="#6f9cc9">
    <rect x="1060" y="60" width="420" height="250" rx="8" stroke-width="1.2" opacity="0.3"/>
    <path d="M1060 92 H1480" stroke-width="1" opacity="0.22"/>
    <circle cx="1082" cy="76" r="4" opacity="0.3"/>
    <circle cx="1098" cy="76" r="4" opacity="0.22"/>
    <circle cx="1114" cy="76" r="4" opacity="0.15"/>
    <rect x="1130" y="150" width="420" height="250" rx="8" stroke-width="1" opacity="0.12"/>
  </g>
  <!-- prompt chevrons and cursor -->
  <g fill="none" stroke="#8fb4d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1092 122 l 14 12 l -14 12" opacity="0.55"/>
    <path d="M1092 168 l 14 12 l -14 12" opacity="0.35"/>
  </g>
  <g fill="#8fb4d9">
    <rect x="1116" y="142" width="20" height="3" rx="1.5" opacity="0.5"/>
    <rect x="1116" y="188" width="20" height="3" rx="1.5" opacity="0.3"/>
  </g>
  <!-- faint response lines inside panel -->
  <g fill="#6f9cc9">
    <rect x="1092" y="214" width="180" height="3" rx="1.5" opacity="0.2"/>
    <rect x="1092" y="232" width="240" height="3" rx="1.5" opacity="0.16"/>
    <rect x="1092" y="250" width="140" height="3" rx="1.5" opacity="0.12"/>
  </g>
  <!-- circuit traces, left field -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.1">
    <path d="M-40 330 H 220 V 240 H 430" opacity="0.24"/>
    <path d="M-40 380 H 320 V 300 H 560 V 240" opacity="0.16"/>
    <path d="M120 420 V 356 H 400" opacity="0.12"/>
  </g>
  <g fill="#8fb4d9">
    <circle cx="430" cy="240" r="3" opacity="0.5"/>
    <circle cx="560" cy="240" r="2.4" opacity="0.35"/>
    <circle cx="400" cy="356" r="2.4" opacity="0.3"/>
    <circle cx="220" cy="240" r="2" opacity="0.3"/>
  </g>
</svg>
