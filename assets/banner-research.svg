  <path d="M0 352 L 180 348 L 340 338 L 500 330 L 660 300 L 820 268 L 980 246 L 1140 208 L 1300 176 L 1460 132 L 1600 104" fill="none" stroke="url(#beam)" stroke-width="1.6"/>
