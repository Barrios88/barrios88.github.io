<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a7fb5" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4a7fb5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4a7fb5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- concentric arches, right cluster -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.3">
    <path d="M1030 420 a250 250 0 0 1 500 0" opacity="0.45"/>
    <path d="M1065 420 a215 215 0 0 1 430 0" opacity="0.36"/>
    <path d="M1100 420 a180 180 0 0 1 360 0" opacity="0.28"/>
    <path d="M1135 420 a145 145 0 0 1 290 0" opacity="0.2"/>
    <path d="M1170 420 a110 110 0 0 1 220 0" opacity="0.14"/>
  </g>
  <!-- faint far arch, left edge -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.1">
    <path d="M-140 420 a240 240 0 0 1 480 0" opacity="0.16"/>
    <path d="M-100 420 a200 200 0 0 1 400 0" opacity="0.1"/>
  </g>
  <!-- rising curve of findings, crossing the arches -->
  <path d="M0 356 C 320 340, 560 300, 820 258 S 1300 150, 1600 84" fill="none" stroke="url(#beam)" stroke-width="1.6"/>
  <g fill="#8fb4d9">
    <circle cx="420" cy="330" r="2.2" opacity="0.5"/>
    <circle cx="700" cy="280" r="2.6" opacity="0.6"/>
    <circle cx="960" cy="232" r="2.4" opacity="0.55"/>
    <circle cx="1180" cy="186" r="3" opacity="0.7"/>
    <circle cx="1380" cy="136" r="2.6" opacity="0.6"/>
    <circle cx="1530" cy="100" r="2.2" opacity="0.5"/>
  </g>
</svg>
