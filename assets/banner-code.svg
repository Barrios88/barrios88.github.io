<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- concentric arches, right cluster -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.3">
    <path d="M1060 420 a240 240 0 0 1 480 0" opacity="0.42"/>
    <path d="M1095 420 a205 205 0 0 1 410 0" opacity="0.32"/>
    <path d="M1130 420 a170 170 0 0 1 340 0" opacity="0.24"/>
    <path d="M1165 420 a135 135 0 0 1 270 0" opacity="0.16"/>
  </g>
  <!-- faint left arch -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.1">
    <path d="M-130 420 a235 235 0 0 1 470 0" opacity="0.15"/>
    <path d="M-90 420 a195 195 0 0 1 390 0" opacity="0.09"/>
  </g>
  <!-- ledger ruling inside the arch: thin rules + double-rule column divider -->
  <g stroke="#8fb4d9" stroke-width="1">
    <path d="M1150 260 H 1450" opacity="0.3"/>
    <path d="M1150 292 H 1450" opacity="0.24"/>
    <path d="M1150 324 H 1450" opacity="0.2"/>
    <path d="M1150 356 H 1450" opacity="0.16"/>
    <path d="M1150 388 H 1450" opacity="0.12"/>
  </g>
  <!-- double vertical rule (ledger money column) -->
  <g stroke="#8fb4d9" stroke-width="1">
    <path d="M1358 246 V 402" opacity="0.32"/>
    <path d="M1366 246 V 402" opacity="0.22"/>
  </g>
  <!-- header rule with engraved weight -->
  <path d="M1150 244 H 1450" stroke="#8fb4d9" stroke-width="1.6" opacity="0.34"/>
</svg>
