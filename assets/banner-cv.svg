<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a7fb5" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4a7fb5" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#4a7fb5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- concentric arches, right cluster -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.3">
    <path d="M1070 420 a240 240 0 0 1 480 0" opacity="0.4"/>
    <path d="M1105 420 a205 205 0 0 1 410 0" opacity="0.3"/>
    <path d="M1140 420 a170 170 0 0 1 340 0" opacity="0.22"/>
    <path d="M1175 420 a135 135 0 0 1 270 0" opacity="0.15"/>
  </g>
  <!-- faint left arch -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.1">
    <path d="M-120 420 a220 220 0 0 1 440 0" opacity="0.14"/>
    <path d="M-80 420 a180 180 0 0 1 360 0" opacity="0.08"/>
  </g>
  <!-- single quiet timeline through the arches -->
  <path d="M0 312 H1600" stroke="url(#beam)" stroke-width="1.5"/>
  <g stroke="#6f9cc9" stroke-width="1" opacity="0.3">
    <path d="M340 312 v -12 M630 312 v -12 M890 312 v -12 M1130 312 v -12 M1370 312 v -12"/>
  </g>
  <g fill="#8fb4d9">
    <circle cx="340" cy="312" r="3" opacity="0.5"/>
    <circle cx="630" cy="312" r="3.4" opacity="0.6"/>
    <circle cx="890" cy="312" r="3" opacity="0.5"/>
    <circle cx="1130" cy="312" r="3.8" opacity="0.68"/>
    <circle cx="1370" cy="312" r="3" opacity="0.5"/>
  </g>
  <g fill="none" stroke="#6f9cc9" stroke-width="1">
    <circle cx="1130" cy="312" r="11" opacity="0.24"/>
    <circle cx="630" cy="312" r="9" opacity="0.16"/>
  </g>
</svg>
