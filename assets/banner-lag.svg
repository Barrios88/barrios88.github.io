<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- colonnade: repeating arches, weight rising to the right -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.2">
    <path d="M60 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.1"/>
    <path d="M280 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.14"/>
    <path d="M500 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.18"/>
    <path d="M720 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.24"/>
    <path d="M940 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.3"/>
    <path d="M1160 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.38"/>
    <path d="M1380 420 V 320 a70 70 0 0 1 140 0 V 420" opacity="0.45"/>
  </g>
  <!-- architrave line above the colonnade -->
  <path d="M0 236 H1600" stroke="#6f9cc9" stroke-width="1" opacity="0.16"/>
  <!-- community: linked dots between the columns -->
  <path d="M350 372 L 570 366 L 790 372 L 1010 366 L 1230 372 L 1450 366" stroke="#8fb4d9" stroke-width="1" fill="none" opacity="0.22"/>
  <g fill="#8fb4d9">
    <circle cx="350" cy="372" r="2.2" opacity="0.4"/>
    <circle cx="570" cy="366" r="2.6" opacity="0.5"/>
    <circle cx="790" cy="372" r="2.4" opacity="0.45"/>
    <circle cx="1010" cy="366" r="3" opacity="0.6"/>
    <circle cx="1230" cy="372" r="2.6" opacity="0.55"/>
    <circle cx="1450" cy="366" r="2.8" opacity="0.6"/>
  </g>
</svg>
