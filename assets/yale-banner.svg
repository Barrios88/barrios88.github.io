<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a7fb5" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4a7fb5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4a7fb5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- concentric arches: quiet nod to collegiate architecture -->
  <g fill="none" stroke="#6f9cc9" stroke-width="1.3">
    <path d="M1090 420 a230 230 0 0 1 460 0" opacity="0.5"/>
    <path d="M1120 420 a200 200 0 0 1 400 0" opacity="0.4"/>
    <path d="M1150 420 a170 170 0 0 1 340 0" opacity="0.32"/>
    <path d="M1180 420 a140 140 0 0 1 280 0" opacity="0.25"/>
    <path d="M1210 420 a110 110 0 0 1 220 0" opacity="0.18"/>
    <path d="M860 420 a300 300 0 0 1 600 0" opacity="0.22"/>
    <path d="M-60 420 a260 260 0 0 1 520 0" opacity="0.3"/>
    <path d="M-20 420 a220 220 0 0 1 440 0" opacity="0.22"/>
    <path d="M20 420 a180 180 0 0 1 360 0" opacity="0.15"/>
  </g>
  <!-- rising line, data motif -->
  <g fill="none" stroke-width="1.6">
    <path d="M0 340 C 260 320, 420 250, 640 232 S 1080 170, 1600 96" stroke="url(#beam)"/>
  </g>
  <g fill="#8fb4d9">
    <circle cx="640" cy="232" r="3" opacity="0.8"/>
    <circle cx="980" cy="196" r="2.4" opacity="0.6"/>
    <circle cx="1290" cy="140" r="2.8" opacity="0.7"/>
    <circle cx="380" cy="262" r="2.2" opacity="0.55"/>
  </g>
</svg>
