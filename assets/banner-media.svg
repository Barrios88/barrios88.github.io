  <g fill="none" stroke="#6f9cc9" stroke-width="1.1">
    <path d="M40 420 V 350 a55 55 0 0 1 110 0 V 420" opacity="0.16"/>
    <path d="M210 420 V 350 a55 55 0 0 1 110 0 V 420" opacity="0.12"/>
