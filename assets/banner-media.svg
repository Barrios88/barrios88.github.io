<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00356b"/>
      <stop offset="0.55" stop-color="#00294f"/>
      <stop offset="1" stop-color="#001d3a"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="420" fill="url(#bg)"/>
  <!-- fine grid -->
  <g stroke="#3d6ea3" stroke-width="1" opacity="0.14">
    <path d="M0 105 H1600 M0 210 H1600 M0 315 H1600"/>
    <path d="M200 0 V420 M400 0 V420 M600 0 V420 M800 0 V420 M1000 0 V420 M1200 0 V420 M1400 0 V420"/>
  </g>
  <!-- broadcast waves from bottom-right corner -->
  <g fill="none" stroke="#6f9cc9">
    <path d="M1600 420 m -70 0 a 70 70 0 0 1 70 -70" stroke-width="1.4" opacity="0.42"/>
    <path d="M1600 420 m -140 0 a 140 140 0 0 1 140 -140" stroke-width="1.3" opacity="0.34"/>
    <path d="M1600 420 m -215 0 a 215 215 0 0 1 215 -215" stroke-width="1.2" opacity="0.26"/>
    <path d="M1600 420 m -295 0 a 295 295 0 0 1 295 -295" stroke-width="1.1" opacity="0.2"/>
    <path d="M1600 420 m -380 0 a 380 380 0 0 1 380 -380" stroke-width="1" opacity="0.14"/>
    <path d="M1600 420 m -470 0 a 470 470 0 0 1 470 -470" stroke-width="1" opacity="0.09"/>
  </g>
  <circle cx="1600" cy="420" r="16" fill="#8fb4d9" opacity="0.3"/>
  <!-- answering waves, upper-left, fainter -->
  <g fill="none" stroke="#6f9cc9">
    <path d="M0 0 m 60 0 a 60 60 0 0 1 -60 60" stroke-width="1.2" opacity="0.22"/>
    <path d="M0 0 m 125 0 a 125 125 0 0 1 -125 125" stroke-width="1.1" opacity="0.16"/>
    <path d="M0 0 m 195 0 a 195 195 0 0 1 -195 195" stroke-width="1" opacity="0.11"/>
    <path d="M0 0 m 270 0 a 270 270 0 0 1 -270 270" stroke-width="1" opacity="0.07"/>
  </g>
  <!-- signal dots travelling between them -->
  <g fill="#8fb4d9">
    <circle cx="1210" cy="180" r="2.8" opacity="0.55"/>
    <circle cx="1040" cy="250" r="2.2" opacity="0.4"/>
    <circle cx="850" cy="320" r="2" opacity="0.3"/>
    <circle cx="420" cy="160" r="2.2" opacity="0.35"/>
    <circle cx="620" cy="120" r="2" opacity="0.28"/>
  </g>
</svg>
