name: Refresh citation counts

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch citation counts from OpenAlex
        run: node scripts/fetch-citations.mjs

      - name: Rebuild generated pages
        run: node build.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/citations.json research.html barrios.bib sitemap.xml robots.txt
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh citation counts"
            git push
          fi
